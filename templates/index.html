<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Enhancer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 95%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 28px;
            color: #2d3748;
        }

        .action-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-ui {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            width: 220px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
        }

        .upload-label {
            background: #edf2f7;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .upload-label:hover {
            background: #e2e8f0;
        }

        .enhance-btn {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .enhance-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        input[type="file"] {
            display: none;
        }

        #preview-container {
            display: none;
            margin: 10px 0;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #fdfdfd;
            width: 100%;
            max-width: 400px;
        }

        #preview-img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .file-info {
            font-size: 14px;
            color: #48bb78;
            font-weight: 600;
            margin-top: 10px;
        }

        .error {
            color: red;
            font-weight: 600;
        }

        .loading {
            margin-top: 20px;
            display: none;
            font-weight: bold;
            color: #667eea;
        }

        .images {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .image-box {
            flex: 1;
            min-width: 250px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
        }

        .result-img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .download-btn {
            margin-top: 25px;
            background: #48bb78;
            color: white;
            padding: 12px 40px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #38a169;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>✨ AI Image Enhancer</h1>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="error">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data" onsubmit="return validateForm()">
            <div class="action-group">
                <label class="btn-ui upload-label">
                    📁 Chọn ảnh từ máy
                    <input type="file" name="image" id="imageInput" required onchange="handleFileSelect(this)">
                </label>

                <div id="preview-container">
                    <img id="preview-img" src="#" alt="Preview">
                    <div id="file-name" class="file-info"></div>
                </div>

                <button type="submit" class="btn-ui enhance-btn">🚀 Nâng cấp ảnh</button>

                <div id="error" class="error"></div>
            </div>

            <div class="loading" id="loading">
                Đang xử lý... Vui lòng đợi trong giây lát
            </div>
        </form>
        {% if input_file and output_file %}
        <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">
        <div class="images">
            <div class="image-box">
                <p><strong>Ảnh gốc</strong></p>
                <img src="/uploads/{{ input_file }}" class="result-img">
            </div>

            <div class="image-box">
                <p><strong>Ảnh đã xử lý</strong></p>
                <img src="/outputs/{{ output_file }}" class="result-img">
            </div>
        </div>

        <a href="/outputs/{{ output_file }}" download style="text-decoration: none;">
            <button class="download-btn">Tải ảnh chất lượng cao</button>
        </a>
        {% endif %}
    </div>

    <script>
        function validateForm() {
            const input = document.getElementById('imageInput');
            const errorDiv = document.getElementById('error');

            if (input.files.length > 0) {
                const file = input.files[0];
                if (file.size > 20 * 1024 * 1024) {
                    errorDiv.innerText = "File quá lớn! Vui lòng chọn ảnh dưới 20MB.";
                    return false;
                }
                document.getElementById("loading").style.display = "block";
            }
            return true;
        }

        function handleFileSelect(input) {
            const previewContainer = document.getElementById('preview-container');
            const previewImg = document.getElementById('preview-img');
            const fileNameDisplay = document.getElementById('file-name');
            const errorDiv = document.getElementById('error');

            if (input.files && input.files[0]) {
                const file = input.files[0];

                if (file.size > 20 * 1024 * 1024) {
                    errorDiv.innerText = "File quá lớn! Vui lòng chọn ảnh dưới 20MB.";
                    input.value = "";
                    previewContainer.style.display = "none";
                    return;
                } else {
                    errorDiv.innerText = "";
                }

                const reader = new FileReader();

                reader.onload = function (e) {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = "block";
                    fileNameDisplay.innerText = "Tệp đã chọn: " + file.name;
                }

                reader.readAsDataURL(file);
            }
        }
    </script>

</body>

</html>
